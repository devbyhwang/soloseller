name: Build Windows portable app

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package:win
      - uses: actions/upload-artifact@v4
        with:
          name: peach-order-ledger-windows
          path: release/*.exe
